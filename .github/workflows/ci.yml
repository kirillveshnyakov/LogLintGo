name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install dependencies
        run: go mod tidy

      - name: Build loglinter
        run: go build -o loglinter ./cmd/loglinter

      - name: Run tests
        run: go test ./tests/... -v -race

      - name: Build custom-gcl
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
          golangci-lint custom -v

      - name: Run linter on test_data
        run: ./custom-gcl run ./tests/...
